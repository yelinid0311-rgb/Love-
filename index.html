<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Universe 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background -->
<div class="stars"></div>

<!-- Musik -->
<audio autoplay loop>
  <source src="assets/music.mp3" type="audio/mp3">
</audio>

<!-- Landing -->
<section class="hero">
  <h1 class="glow">I Love You 💖</h1>
  <p id="typing"></p>
  <button onclick="showLove()">Klik Aku 💌</button>
</section>

<!-- Galeri -->
<section class="gallery">
  <h2>Kenangan Kita 📸</h2>
  <div class="photos">
    <img src="assets/foto1.jpg">
    <img src="assets/foto2.jpg">
  </div>
</section>

<!-- Countdown -->
<section class="countdown">
  <h2>Sejak Kita Bersama ⏳</h2>
  <p id="time"></p>
</section>

<!-- Popup -->
<div id="popup" class="hidden">
  <h2>Aku Sayang Kamu 💕</h2>
</div>

<script src="script.js"></script>
</body>
</html>
